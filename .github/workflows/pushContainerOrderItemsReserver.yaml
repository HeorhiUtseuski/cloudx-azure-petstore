name: Build and Push to ACR
on:
  push:
    paths:
      - 'orderitemsreserver/**'
    branches:
      - 'main'
jobs:
  build:
    name: 'Build and Push to ACR orderitemsreserver'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: test
        run: echo "[${{ vars.ACR_REGISTRY }}] [${{ secrets.ACR_USERNAME }}] [${{ secrets.ACR_PASSWORD }}]"

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push App
        uses: docker/build-push-action@v6
        with:
          context: ./orderitemsreserver
          push: true
          tags: "${{ vars.ACR_REGISTRY }}/orderitemsreserver:latest"