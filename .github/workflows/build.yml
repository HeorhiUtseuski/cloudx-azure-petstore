name: Build and Push Modules

on:
  push:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build from'
        required: true
        type: string

jobs:
  detect-and-build:
    name: Detect changes and build affected modules
    runs-on: ubuntu-latest

    env:
      SELECTED_BRANCH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch || github.ref_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SELECTED_BRANCH }}

      - name: Detect changed modules
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            petstoreapp:
              - 'petstoreapp/**'
            petstoreorderservice:
              - 'petstoreorderservice/**'
            petstorepetservice:
              - 'petstorepetservice/**'
            petstoreproductservice:
              - 'petstoreproductservice/**'

      - name: Build and Push petstoreapp
        if: steps.changes.outputs.petstoreapp == 'true'
        uses: ./.github/actions/build-and-push-module
        with:
          module-name: petstoreapp
          branch-name: ${{ env.SELECTED_BRANCH }}

      - name: Build and Push petstoreorderservice
        if: steps.changes.outputs.petstoreorderservice == 'true'
        uses: ./.github/actions/build-and-push-module
        with:
          module-name: petstoreorderservice
          branch-name: ${{ env.SELECTED_BRANCH }}

      - name: Build and Push petstorepetservice
        if: steps.changes.outputs.petstorepetservice == 'true'
        uses: ./.github/actions/build-and-push-module
        with:
          module-name: petstorepetservice
          branch-name: ${{ env.SELECTED_BRANCH }}

      - name: Build and Push petstoreproductservice
        if: steps.changes.outputs.petstoreproductservice == 'true'
        uses: ./.github/actions/build-and-push-module
        with:
          module-name: petstoreproductservice
          branch-name: ${{ env.SELECTED_BRANCH }}
