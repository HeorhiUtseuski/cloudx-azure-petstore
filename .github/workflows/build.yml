name: Build and Push Modules

on:
  push:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build all modules regardless of changes'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  detect-and-build:
    name: Detect changes and build affected modules
    runs-on: ubuntu-latest

    env:
      FORCE_BUILD: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_build || 'false' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Detect changed modules
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            petstoreapp:
              - 'petstoreapp/**'
            petstoreorderservice:
              - 'petstoreorderservice/**'
            petstorepetservice:
              - 'petstorepetservice/**'
            petstoreproductservice:
              - 'petstoreproductservice/**'

      - name: Build and Push petstoreapp
        if: env.FORCE_BUILD == 'true' || steps.changes.outputs.petstoreapp == 'true'
        uses: ./.github/actions/build-and-push-module
        with:
          module-name: petstoreapp
          branch-name: ${{ github.ref_name }}
          azure-credentials: ${{ secrets.AZURE_CREDENTIALS }}
          azure-acr-registry: ${{ vars.AZURE_CONTAINER_REGISTRY }}
          azure-resource-group: ${{ vars.AZURE_RESOURCE_GROUP }}

      - name: Build and Push petstoreorderservice
        if: env.FORCE_BUILD == 'true' || steps.changes.outputs.petstoreorderservice == 'true'
        uses: ./.github/actions/build-and-push-module
        with:
          module-name: petstoreorderservice
          branch-name: ${{ github.ref_name }}
          azure-credentials: ${{ secrets.AZURE_CREDENTIALS }}
          azure-acr-registry: ${{ vars.AZURE_CONTAINER_REGISTRY }}
          azure-resource-group: ${{ vars.AZURE_RESOURCE_GROUP }}

      - name: Build and Push petstorepetservice
        if: env.FORCE_BUILD == 'true' || steps.changes.outputs.petstorepetservice == 'true'
        uses: ./.github/actions/build-and-push-module
        with:
          module-name: petstorepetservice
          branch-name: ${{ github.ref_name }}
          azure-credentials: ${{ secrets.AZURE_CREDENTIALS }}
          azure-acr-registry: ${{ vars.AZURE_CONTAINER_REGISTRY }}
          azure-resource-group: ${{ vars.AZURE_RESOURCE_GROUP }}

      - name: Build and Push petstoreproductservice
        if: env.FORCE_BUILD == 'true' || steps.changes.outputs.petstoreproductservice == 'true'
        uses: ./.github/actions/build-and-push-module
        with:
          module-name: petstoreproductservice
          branch-name: ${{ github.ref_name }}
          azure-credentials: ${{ secrets.AZURE_CREDENTIALS }}
          azure-acr-registry: ${{ vars.AZURE_CONTAINER_REGISTRY }}
          azure-resource-group: ${{ vars.AZURE_RESOURCE_GROUP }}
