name: Build and Push to ACR
on:
  push:
    branches:
      - 'main'
jobs:
  build:
    name: 'Build and Push to ACR'
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Login
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push App
        uses: docker/build-push-action@v2
        with:
          push: true
          tags: "${{ secrets.ACR_LOGIN_SERVER }}/petstoreapp:latest"
          file: ./petstoreapp/Dockerfile

      - name: Build and Push Order Service
        uses: docker/build-push-action@v2
        with:
          push: true
          tags: "${{ secrets.ACR_LOGIN_SERVER }}/petstoreorderservice:latest"
          file: ./petstoreorderservice/Dockerfile

      - name: Build and Push Pet Service
        uses: docker/build-push-action@v2
        with:
          push: true
          tags: "${{ secrets.ACR_LOGIN_SERVER }}/petstorepetservice:latest"
          file: ./petstorepetservice/Dockerfile

      - name: Build and Push Product Service
        uses: docker/build-push-action@v2
        with:
          push: true
          tags: "${{ secrets.ACR_LOGIN_SERVER }}/petstoreproductservice:latest"
          file: ./petstoreproductservice/Dockerfile