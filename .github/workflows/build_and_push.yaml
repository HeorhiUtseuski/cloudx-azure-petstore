name: Build and Push to ACR
on:
  push:
    branches:
      - 'main'
jobs:
  build:
    name: 'Build and Push to ACR'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          registry: "${{ env.ACR_REGISTRY }}"
          username: "${{ secrets.ACR_USERNAME }}"
          password: "${{ secrets.ACR_PASSWORD }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push App
        uses: docker/build-push-action@v6
        with:
          context: ./petstoreapp
          push: true
          tags: "${{ env.ACR_REGISTRY }}/petstoreapp:latest"

      - name: Build and Push Order Service
        uses: docker/build-push-action@v2
        with:
          context: ./petstoreorderservice
          push: true
          tags: "${{ env.ACR_REGISTRY }}/petstoreorderservice:latest"

      - name: Build and Push Pet Service
        uses: docker/build-push-action@v2
        with:
          context: ./petstorepetservice
          push: true
          tags: "${{ env.ACR_REGISTRY }}/petstorepetservice:latest"

      - name: Build and Push Product Service
        uses: docker/build-push-action@v2
        with:
          context: ./petstoreproductservice
          push: true
          tags: "${{ env.ACR_REGISTRY }}/petstoreproductservice:latest"